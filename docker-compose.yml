services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: em_app
    ports:
      - "8000:8000"
    environment:
      MODE: LOCAL
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: em_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET_KEY: dev_secret_key
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: em_db
    environment:
      POSTGRES_DB: em_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d em_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: em_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
